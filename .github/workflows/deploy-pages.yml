name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config from secrets
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|__FIREBASE_API_KEY__|${FB_API_KEY}|g" firebase-config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FB_AUTH_DOMAIN}|g" firebase-config.js
          sed -i "s|__FIREBASE_DATABASE_URL__|${FB_DATABASE_URL}|g" firebase-config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FB_PROJECT_ID}|g" firebase-config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FB_STORAGE_BUCKET}|g" firebase-config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FB_MESSAGING_SENDER_ID}|g" firebase-config.js
          sed -i "s|__FIREBASE_APP_ID__|${FB_APP_ID}|g" firebase-config.js
          echo "--- Verify injection ---"
          grep databaseURL firebase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
